<!-- 文字跟随特效 - 节流版 -->
<script>
    const letters = ['∞'];
    let currentLetter = 0;
    let lastTime = 0;
    const throttleTime = 50; // 毫秒，50ms 生成一个
    
    document.addEventListener('mousemove', function(e) {
        const now = Date.now();
        if (now - lastTime < throttleTime) return; // 太密集就跳过
        lastTime = now;
        
        const span = document.createElement('span');
        span.textContent = letters[currentLetter];
        span.style.position = 'fixed';
        span.style.left = e.clientX + 'px';
        span.style.top = e.clientY + 'px';
        span.style.fontSize = '40px';
        span.style.fontWeight = 'bold';
        span.style.color = '#66CCFF';
        span.style.textShadow = '2px 2px 4px rgba(0,0,0,0.5)';
        span.style.pointerEvents = 'none';
        span.style.opacity = '1';
        span.style.transition = 'opacity 1.5s, transform 1.5s';
        span.style.transform = 'translateY(0)';
        document.body.appendChild(span);
        
        setTimeout(() => {
            span.style.opacity = '0';
            span.style.transform = 'translateY(-30px)';
        }, 50);
        
        setTimeout(() => span.remove(), 2000);
        
        currentLetter = (currentLetter + 1) % letters.length;
    });
</script>
<style>
    @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-100px); opacity: 0; }
    }
</style>
